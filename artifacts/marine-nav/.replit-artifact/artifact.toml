kind = "mobile"
previewPath = "/"
title = "Marine Navigator"
version = "1.0.0"
id = "artifacts/marine-nav"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18863

[services.development]
run = "pnpm --filter @workspace/marine-nav run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/marine-nav", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/marine-nav", "run", "serve" ]

[services.env]
PORT = "18863"
BASE_PATH = "/"
